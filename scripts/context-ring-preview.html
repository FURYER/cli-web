<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Context ring preview</title>
  <style>
    :root {
      --color-surface: #141414;
      --color-panel: #181818;
      --color-elevated: #262626;
      --color-ink: #e6e6e6;
      --color-muted: #8a8a8a;
      --color-accent: #3c9eff;
      --color-line: #2f2f2f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--color-surface);
      color: var(--color-ink);
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .stage {
      min-height: 100vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 48px 24px 80px;
    }
    .composer-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(560px, 100%);
      padding: 12px 14px;
      border: 1px solid var(--color-line);
      border-radius: 12px;
      background: var(--color-panel);
    }
    .fake-input {
      flex: 1;
      color: var(--color-muted);
      font-size: 13px;
    }
    .model {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      background: var(--color-elevated);
      padding: 6px 10px;
      border-radius: 6px;
    }
    .ring-wrap { position: relative; }
    .ring-btn {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--color-muted);
      cursor: pointer;
      padding: 0;
    }
    .tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      border: 1px solid var(--color-line);
      background: var(--color-panel);
      color: var(--color-ink);
      font-family: ui-monospace, monospace;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    .panel {
      position: absolute;
      bottom: calc(100% + 8px);
      right: 0;
      width: 288px;
      border: 1px solid var(--color-line);
      background: var(--color-panel);
      border-radius: 12px;
      box-shadow: 0 16px 40px rgba(0,0,0,.45);
      overflow: hidden;
    }
    .panel-head {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--color-line);
    }
    .panel-title { font-size: 14px; font-weight: 500; margin: 0; }
    .panel-sub {
      margin: 2px 0 0;
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--color-muted);
    }
    ul { list-style: none; margin: 0; padding: 8px 12px; }
    li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      font-size: 14px;
    }
    .dot { width: 10px; height: 10px; border-radius: 999px; flex-shrink: 0; }
    .label { flex: 1; min-width: 0; }
    .tokens {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--color-muted);
      white-space: nowrap;
    }
    .pct { margin-left: 4px; opacity: .7; }
    .footer {
      border-top: 1px solid var(--color-line);
      padding: 8px 12px;
      font-family: ui-monospace, monospace;
      font-size: 10px;
      color: var(--color-muted);
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="composer-bar">
      <div class="fake-input">Ask the agent…</div>
      <div class="model">Composer 2</div>
      <div class="ring-wrap" id="ring">
        <button class="ring-btn" id="ringBtn" type="button" aria-label="Context">
          <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
            <circle cx="9" cy="9" r="7.75" fill="none" stroke="currentColor" stroke-opacity="0.25" stroke-width="2.5" />
            <circle id="smallArc" cx="9" cy="9" r="7.75" fill="none" stroke="#3c9eff" stroke-width="2.5" stroke-linecap="round"
              stroke-dasharray="20.5 28.2" transform="rotate(-90 9 9)" />
          </svg>
        </button>
        <div class="tooltip hidden" id="tooltip">Context 42.1%</div>
        <div class="panel hidden" id="panel">
          <div class="panel-head">
            <svg width="44" height="44" viewBox="0 0 44 44" aria-hidden="true">
              <circle cx="22" cy="22" r="16" fill="none" stroke="var(--color-line)" stroke-width="5" />
              <circle cx="22" cy="22" r="16" fill="none" stroke="#7aa2f7" stroke-width="5" stroke-dasharray="12.5 88" stroke-dashoffset="0" transform="rotate(-90 22 22)" />
              <circle cx="22" cy="22" r="16" fill="none" stroke="#bb9af7" stroke-width="5" stroke-dasharray="28 72.5" stroke-dashoffset="-12.5" transform="rotate(-90 22 22)" />
              <circle cx="22" cy="22" r="16" fill="none" stroke="#e0af68" stroke-width="5" stroke-dasharray="8 92.5" stroke-dashoffset="-40.5" transform="rotate(-90 22 22)" />
              <circle cx="22" cy="22" r="16" fill="none" stroke="#9ece6a" stroke-width="5" stroke-dasharray="4 96.5" stroke-dashoffset="-48.5" transform="rotate(-90 22 22)" />
              <circle cx="22" cy="22" r="16" fill="none" stroke="#f7768e" stroke-width="5" stroke-dasharray="6 94.5" stroke-dashoffset="-52.5" transform="rotate(-90 22 22)" />
              <circle cx="22" cy="22" r="16" fill="none" stroke="#2ac3de" stroke-width="5" stroke-dasharray="3 97.5" stroke-dashoffset="-58.5" transform="rotate(-90 22 22)" />
              <circle cx="22" cy="22" r="16" fill="none" stroke="#7dcfff" stroke-width="5" stroke-dasharray="39.5 61" stroke-dashoffset="-61.5" transform="rotate(-90 22 22)" />
              <circle cx="22" cy="22" r="11" fill="var(--color-panel)" />
              <text x="22" y="22" text-anchor="middle" dominant-baseline="central" fill="#e6e6e6" style="font-size:9px;font-family:ui-monospace,monospace">42%</text>
            </svg>
            <div>
              <p class="panel-title">Context used</p>
              <p class="panel-sub">108k / 256k</p>
            </div>
          </div>
          <ul>
            <li><span class="dot" style="background:#7aa2f7"></span><span class="label">System Prompt</span><span class="tokens">8.4k<span class="pct">7.8%</span></span></li>
            <li><span class="dot" style="background:#bb9af7"></span><span class="label">Tool Definitions</span><span class="tokens">38.2k<span class="pct">35.4%</span></span></li>
            <li><span class="dot" style="background:#e0af68"></span><span class="label">Rules</span><span class="tokens">5.6k<span class="pct">5.2%</span></span></li>
            <li><span class="dot" style="background:#9ece6a"></span><span class="label">Skills</span><span class="tokens">2.1k<span class="pct">1.9%</span></span></li>
            <li><span class="dot" style="background:#f7768e"></span><span class="label">MCP</span><span class="tokens">4.0k<span class="pct">3.7%</span></span></li>
            <li><span class="dot" style="background:#2ac3de"></span><span class="label">Subagents</span><span class="tokens">1.8k<span class="pct">1.7%</span></span></li>
            <li><span class="dot" style="background:#7dcfff"></span><span class="label">Conversation</span><span class="tokens">47.9k<span class="pct">44.3%</span></span></li>
          </ul>
          <div class="footer">Last turn · in 95.2k · out 2.4k · cache 12.8k</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const mode = new URLSearchParams(location.search).get("mode") || "collapsed";
    const tooltip = document.getElementById("tooltip");
    const panel = document.getElementById("panel");
    if (mode === "hover") tooltip.classList.remove("hidden");
    if (mode === "expanded") panel.classList.remove("hidden");
  </script>
</body>
</html>
