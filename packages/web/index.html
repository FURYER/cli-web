<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#141414" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WebCLI" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>WebCLI</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // If the module bundle fails to load (mid-promote / bad dist), show a hint
      // instead of a permanent white screen.
      window.addEventListener("error", function (event) {
        var root = document.getElementById("root");
        if (!root || root.childElementCount > 0) return;
        if (!event.filename || event.filename.indexOf("/assets/") === -1) return;
        root.innerHTML =
          '<div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,sans-serif;background:#141414;color:#e8e8e8;text-align:center">' +
          '<div><p style="margin:0 0 12px;font-size:16px;font-weight:600">App failed to load</p>' +
          '<p style="margin:0 0 16px;font-size:13px;opacity:.7">The UI bundle may be updating. Pull to refresh, or restart release on the PC.</p>' +
          '<button onclick="location.reload()" style="border:0;border-radius:8px;padding:8px 14px;background:#c4f542;color:#111;font-weight:600">Reload</button></div></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
